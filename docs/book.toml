[book]
title = "Fugue Evo Docs"
authors = ["Fugue-Evo Contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/alexnodeland/fugue-evo"
edit-url-template = "https://github.com/alexnodeland/fugue-evo/edit/main/docs/{path}"
site-url = "https://evo.fugue.run/"
additional-css = ["fugue-theme.css", "fugue-viz.css"]
additional-js = [
    "fugue-brand.js",
    "fugue-viz.js",
    "fugue-evo-wasm-loader.js",
    "viz/landscape.js",
    "viz/cmaes.js",
    "viz/nsga2.js",
    "viz/island.js",
    "viz/inline.js",
    "viz/playground.js",
]

[output.html.playground]
editable = true
line-numbers = true

[output.html.code]
hidelines = { rust = "#" }

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30

[preprocessor.links]
